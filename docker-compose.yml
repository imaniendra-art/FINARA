version: '3.8'

services:
  finara:
    build:
      context: .
      dockerfile: Dockerfile
    image: finara:latest
    container_name: finara-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    # Enables connecting to services (like MongoDB/MinIO) running on your host machine
    # using host.docker.internal instead of localhost/127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
